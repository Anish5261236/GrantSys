<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | GrantSys</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter..." rel="stylesheet">
    <style>
        :root { --primary: #6366f1; }
        [data-theme="dark"] { --primary: #818cf8; }
        * { margin: 0; padding: 0; font-family: 'Inter', sans-serif;}
        body { display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px; box-sizing: border-box;}
        .login-box { width: 100%; max-width: 400px; padding: 40px; box-sizing: border-box; text-align: center;}
        input { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box;}
        button { width: 100%; padding: 10px; background: var(--primary); color: white; border: none; cursor: pointer; border-radius: 4px;}
        h2 { margin-bottom: 20px; }
    </style>
    <script>
        if(localStorage.getItem("theme") === "dark") {
            document.documentElement.setAttribute("data-theme", "dark");
        }
    </script>
</head>
<body>

<div id="notification-container"></div>

<div class="login-box">
    <h2>GrantSys.edu</h2>
    <input type="email" id="email" placeholder="Enter email">
    <input type="password" id="password" placeholder="Enter password">
    <button id="loginBtn" onclick="login()">Login</button>
</div>

<script>
localStorage.clear();

function showNotification(msg, type = "info") {
    const container = document.getElementById("notification-container");
    const div = document.createElement("div");
    div.innerText = msg;
    container.appendChild(div);
    setTimeout(() => div.remove(), 3000);
}

async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const btn = document.getElementById("loginBtn");

    if (!email || !password) {
        return showNotification("Fill all fields");
    }

    btn.innerText = "Loading...";

    try {
        const res = await fetch("/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (data.success) {
            localStorage.setItem("role", data.role);
            localStorage.setItem("email", email);
            showNotification("Login successful");
            setTimeout(() => {
                window.location.href = "/dashboard.html";
            }, 1000);
        } else {
            showNotification("Invalid credentials");
            btn.innerText = "Login";
        }
    } catch (err) {
        showNotification("Server error");
        btn.innerText = "Login";
    }
}
</script>
</body>
</html>
