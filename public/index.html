<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GrantSys</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- EARLY THEME INITIALIZATION -->
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>

    <style>
        /* CSS VARIABLES FOR LIGHT & DARK MODE */
        :root {
            --primary: #6366f1; --primary-hover: #4f46e5; --primary-glow: rgba(99, 102, 241, 0.4);
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --glass-bg: rgba(255, 255, 255, 0.6); --glass-border: rgba(255, 255, 255, 0.8);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
            --text-main: #0f172a; --text-muted: #64748b;
            --card-bg: #ffffff; --input-bg: rgba(255,255,255,0.9);
        }
        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(30, 41, 59, 0.7); --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc; --text-muted: #94a3b8;
            --card-bg: #1e293b; --input-bg: rgba(15, 23, 42, 0.8);
        }

        /* LAYOUT STYLES: Centers the login box vertically and horizontally */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-gradient); color: var(--text-main); display: flex; justify-content: center; align-items: center; height: 100vh; transition: background 0.5s ease, color 0.5s ease; padding: 16px; }

        .login-box { background: var(--glass-bg); backdrop-filter: blur(20px); padding: 48px; border-radius: 24px; width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); position: relative; }
        
        /* INPUT FIELD STYLING */
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 12px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; }
        input { width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--glass-border); color: var(--text-main); background: var(--input-bg); outline: none;}
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-glow); }
        
        button.btn-login { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; margin-top: 8px;}
        
        /* THEME TOGGLE BUTTON - LOGIN SCREEN */
        .theme-toggle-icon { position: absolute; top: 20px; right: 20px; background: transparent; border: none; font-size: 20px; cursor: pointer; opacity: 0.7; transition: 0.3s; }
        .theme-toggle-icon:hover { opacity: 1; transform: scale(1.1); }
    </style>
</head>
<body>
    <div class="login-box">
        <!-- Button to execute theme change logic -->
        <button class="theme-toggle-icon" onclick="toggleTheme()" title="Toggle Theme">🌗</button>
        
        <div style="font-size: 28px; font-weight: 800; color: var(--primary); margin-bottom: 8px;">GrantSys.edu</div>
        <p style="color: var(--text-muted); margin-bottom: 32px; font-size: 14px;">Secure Research Management Portal</p>
        
        <!-- Form Inputs -->
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="Enter your academic email">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        
        <button class="btn-login" id="loginBtn" onclick="login()">Authenticate</button>
    </div>

    <script>
        // Clears any leftover session memory when user arrives at login screen
        localStorage.clear(); 

        /* THEME CONTROLLER */
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        /* LOGIN SIMULATION: Sends credentials to the backend. 
           If successful, stores the Role and Email in LocalStorage for the Dashboard to use. */
        async function login() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            if (!email || !password) return alert("Please fill fields.");

            try {
                // Mockup of a real fetch request
                const res = await fetch("/login", {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem("role", data.role);
                    localStorage.setItem("email", email); 
                    window.location.href = "/dashboard.html"; // Redirects to main app
                } else { alert("Invalid credentials."); }
            } catch(e) { console.error("Error communicating with server."); }
        }
    </script>
</body>
</html>
