<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | GrantSys.edu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter..." rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #6366f1; --bg-gradient: linear-gradient(...); }
        [data-theme="dark"] { --bg-gradient: linear-gradient(...); }
        * { margin: 0; padding: 0; font-family: 'Inter', sans-serif;}
        body { display: flex; height: 100vh; }
        nav { width: 280px; padding: 20px; background: #f4f4f5; border-right: 1px solid #e4e4e7;}
        nav ul { list-style: none; margin-top: 20px;}
        nav li { padding: 10px; cursor: pointer; }
        main { flex: 1; padding: 40px; overflow-y: auto;}
        .stat-card { border-radius: 24px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #ddd; }

        /* -----------------------------------------
           MOBILE RESPONSIVENESS
        ----------------------------------------- */
        #view-dashboard { overflow-x: auto; }

        @media (max-width: 768px) {
            body { flex-direction: column; height: auto; }
            nav { width: 100%; border-right: none; border-bottom: 1px solid #e4e4e7; padding: 15px; box-sizing: border-box; }
            nav ul { display: flex; flex-wrap: wrap; gap: 10px; }
            nav li { flex: 1 1 calc(50% - 10px); text-align: center; background: #fff; border: 1px solid #ddd; border-radius: 6px; }
            main { padding: 20px 10px; }
        }
    </style>
    <script>
        if(localStorage.getItem("theme") === "dark") {
            document.documentElement.setAttribute("data-theme", "dark");
        }
    </script>
</head>
<body>

<div id="notification-container"></div>

<nav id="sidebar">
    <div class="nav-header">
        <h2 class="logo">GrantSys</h2>
        <div class="collapse-btn" onclick="toggleSidebar()">◂</div>
    </div>
    <ul>
        <li onclick="openDashboard()">Dashboard</li>
        <li id="menu-submit" onclick="location.href='/submit.html'">Submit Proposal</li>
        <li onclick="openDashboard()">My Proposals</li>
        <li id="menu-reviews" onclick="location.href='/dashboard.html'">Review Queue</li>
        <li id="menu-users" onclick="switchTab('users')">Manage Users</li>
    </ul>
    <div style="margin-top:20px; cursor:pointer;" onclick="logout()">Sign Out</div>
</nav>

<main>
    <div>
        <h1 id="main-title">Project Dashboard</h1>
        <p id="user-role-label"></p>
        <div id="dynamic-greeting" style="margin-top: 10px; font-weight: bold;">Welcome</div>
    </div>

    <div id="view-dashboard">
        <div id="stats-container"></div>
        <table>
            <thead>
                <tr>
                    <th>Project Title</th>
                    <th>Domain</th>
                    <th>Budget</th>
                    <th>Deadline</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</main>

<script>
const role = localStorage.getItem("role");
const userEmail = localStorage.getItem("email");

if(!role) window.location.href = "/";

document.getElementById("user-role-label").innerText = `Authenticated as ${role}`;

function initializeUserProfile() {
    const hour = new Date().getHours();
    let greeting = "Good Evening";
    if (hour < 12) greeting = "Good Morning";
    else if (hour < 18) greeting = "Good Afternoon";
    let displayName = userEmail.split('@')[0];
    document.getElementById("dynamic-greeting").innerText = `${greeting}, ${displayName}`;
}
initializeUserProfile();

["menu-submit", "menu-reviews", "menu-users"].forEach(id => {
    if(document.getElementById(id)) document.getElementById(id).style.display = "none";
});

if (role === "Faculty") {
    document.getElementById("menu-submit").style.display = "block";
} else if (role === "Reviewer") {
    document.getElementById("menu-reviews").style.display = "block";
} else if (role === "Admin") {
    document.getElementById("menu-users").style.display = "block";
}

let allProposals = [];

async function loadProposals() {
    const res = await fetch("/proposals");
    let data = await res.json();
    if (role === "Faculty") {
        data = data.filter(p => p.submittedBy === userEmail);
    }
    allProposals = data;
    renderTable(data);
}

function renderTable(data) {
    const table = document.getElementById("tableBody");
    table.innerHTML = "";
    data.forEach(p => {
        table.innerHTML += `
            <tr>
                <td>${p.title}</td>
                <td>${p.domain}</td>
                <td>$${p.budget}</td>
                <td>${p.deadline || "Not set"}</td> 
                <td>${p.status}</td>
                <td><a href="/review.html?id=${p._id}" style="color: blue;">View Details</a></td>
            </tr>
        `;
    });
}

function logout() {
    localStorage.clear();
    window.location.href = "/";
}

loadProposals();
</script>
</body>
</html>
