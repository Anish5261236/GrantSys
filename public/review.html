<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Proposal Details | GrantSys</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter..." rel="stylesheet">
    <style>
        :root { --primary: #6366f1; }
        [data-theme="dark"] { --primary: #818cf8; }
        body { display: flex; justify-content: center; font-family: 'Inter', sans-serif;}
        .container { max-width: 860px; width: 100%; padding: 40px;}
        .data-box { background: #f9fafb; padding: 20px; border-radius: 8px; margin-bottom: 20px;}
        textarea { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box;}
        button { padding: 10px 20px; border: none; cursor: pointer; border-radius: 4px;}
        .btn-approve { background: #10b981; color: white; }
        .btn-reject { background: #ef4444; color: white; }
        #action-area { display: none; }
    </style>
    <script>
        if(localStorage.getItem("theme") === "dark") {
            document.documentElement.setAttribute("data-theme", "dark");
        }
    </script>
</head>
<body>

<div id="notification-container"></div>

<div class="container">
    <div style="margin-bottom: 20px;">
        <a href="/dashboard.html" style="text-decoration: none; color: var(--primary);">← Return to Workspace</a>
    </div>

    <h2>
        <span id="page-title">Proposal Details</span>
        <span id="header-status" style="float:right; font-size: 16px; padding: 5px 10px; background: #eee; border-radius: 20px;"></span>
    </h2>

    <div id="data-container" class="data-box"></div>

    <h3>History Log</h3>
    <div id="timeline-container" class="data-box">
        <ul id="history-list"></ul>
    </div>

    <div id="action-area">
        <textarea id="v-comment" rows="4" placeholder="Write feedback..."></textarea>
        <button class="btn-approve" onclick="updateStatus('Approved')">Approve</button>
        <button class="btn-reject" onclick="updateStatus('Rejected')">Reject</button>
    </div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get('id');
const role = localStorage.getItem("role");
const userEmail = localStorage.getItem("email");

if(!role) window.location.href = "/";

function showNotification(msg) {
    const container = document.getElementById('notification-container');
    const div = document.createElement('div');
    div.innerText = msg;
    container.appendChild(div);
    setTimeout(() => div.remove(), 3000);
}

async function load() {
    try {
        const res = await fetch(`/proposals/${id}`);
        const p = await res.json();

        // NEW: Added the deadline to the HTML injection below
        document.getElementById("data-container").innerHTML = `
            <p><b>Title:</b> ${p.title}</p>
            <p><b>Domain:</b> ${p.domain}</p>
            <p><b>Budget:</b> $${p.budget}</p>
            <p><b>Deadline:</b> ${p.deadline || "Not set"}</p> 
            <p><b>Description:</b> <br>${p.description}</p>
        `;

        document.getElementById("header-status").innerText = p.status;

        const historyContainer = document.getElementById("history-list");
        p.history.forEach(log => {
            historyContainer.innerHTML += `
                <li style="margin-bottom: 10px;">
                    <strong>${log.status}</strong> by ${log.reviewedBy}
                    <br><span style="color: #666;">${log.comment}</span>
                </li>
            `;
        });

        if (role === "Reviewer" || role === "Admin") {
            if (p.status === "Pending") {
                document.getElementById("action-area").style.display = "block";
            }
        } else {
            document.getElementById("page-title").innerText = "Status Tracking";
        }
    } catch (err) {
        showNotification("Error loading data");
    }
}

async function updateStatus(status) {
    const comment = document.getElementById("v-comment").value;
    if(!comment.trim()) {
        return showNotification("Comment required");
    }

    try {
        const res = await fetch(`/proposals/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                status,
                comment,
                role,
                email: userEmail
            })
        });

        const data = await res.json();
        if(data.success) {
            showNotification(`Proposal ${status}`);
            setTimeout(() => {
                window.location.href="/dashboard.html";
            }, 1500);
        } else {
            showNotification("Unauthorized action");
        }
    } catch (err) {
        showNotification("Server error");
    }
}

load();
</script>
</body>
</html>
