<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Proposal | GrantSys</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter..." rel="stylesheet">
    <style>
        :root { --primary: #6366f1; }
        [data-theme="dark"] { --primary: #818cf8; }
        body { display: flex; justify-content: center; }
        .form-box { max-width: 600px; width: 100%; padding: 40px; box-sizing: border-box; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; cursor: pointer;}
        .form-label { font-size: 14px; color: #555; display: block; margin-bottom: 5px; }
    </style>
    <script>
        if(localStorage.getItem("theme") === "dark") {
            document.documentElement.setAttribute("data-theme", "dark");
        }
    </script>
</head>
<body>

<div id="notification-container"></div>

<div class="form-box">
    <a href="/dashboard.html" style="text-decoration: none; color: var(--primary);">← Back</a>
    <h2>Submit Research Proposal</h2>

    <input id="title" placeholder="Project Title">
    <input id="domain" placeholder="Domain">
    <input id="budget" type="number" placeholder="Budget">
    
    <label class="form-label" for="deadline">Submission Deadline</label>
    <input id="deadline" type="date">

    <textarea id="description" rows="5" placeholder="Executive Summary"></textarea>
    
    <label class="form-label" for="attachment">Attachment</label>
    <input type="file" id="attachment">

    <button class="btn-submit" id="submitBtn" onclick="submitProposal()">Submit</button>
</div>

<script>
if(!localStorage.getItem("role")) {
    window.location.href = "/";
}

function showNotification(msg) {
    const container = document.getElementById("notification-container");
    const div = document.createElement("div");
    div.innerText = msg;
    container.appendChild(div);
    setTimeout(() => div.remove(), 3000);
}

const fileInput = document.getElementById("attachment");

async function submitProposal() {
    const title = document.getElementById("title").value;
    const description = document.getElementById("description").value;
    const domain = document.getElementById("domain").value;
    const budget = document.getElementById("budget").value;
    const deadline = document.getElementById("deadline").value;

    const btn = document.getElementById("submitBtn");

    if (!title || !description || !domain || !budget || !deadline) {
        return showNotification("Fill all fields, including the deadline");
    }

    btn.innerText = "Submitting...";
    btn.disabled = true;

    const formData = new FormData();
    formData.append("title", title);
    formData.append("description", description);
    formData.append("domain", domain);
    formData.append("budget", budget);
    formData.append("deadline", deadline);
    formData.append("submittedBy", localStorage.getItem("email"));

    if (fileInput.files[0]) {
        formData.append("attachment", fileInput.files[0]);
    }

    try {
        const res = await fetch("/proposals", {
            method: "POST",
            body: formData
        });

        const result = await res.json();

        if (result.success) {
            showNotification("Proposal submitted successfully");
            setTimeout(() => {
                window.location.href = "/dashboard.html";
            }, 1000);
        } else {
            showNotification("Error submitting proposal");
            resetBtn();
        }
    } catch (err) {
        showNotification("Server error");
        resetBtn();
    }
}

function resetBtn() {
    const btn = document.getElementById("submitBtn");
    btn.innerText = "Submit";
    btn.disabled = false;
}
</script>
</body>
</html>
