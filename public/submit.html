<!-- Basic HTML structure -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Page title -->
    <title>Submit Proposal | GrantSys</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter..." rel="stylesheet">

    <style>
        /* Light theme variables */
        :root {
            --primary: #6366f1;
        }

        /* Dark mode */
        [data-theme="dark"] {
            --primary: #818cf8;
        }

        /* Page layout */
        body {
            display: flex;
            justify-content: center;
        }

        /* Form container */
        .form-box {
            max-width: 600px;
            padding: 40px;
        }

        /* Inputs */
        input, textarea {
            width: 100%;
            padding: 10px;
        }

        /* Submit button */
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
        }
    </style>

    <script>
        // Load theme
        if(localStorage.getItem("theme") === "dark") {
            document.documentElement.setAttribute("data-theme", "dark");
        }
    </script>
</head>

<body>

<!-- Notification container -->
<div id="notification-container"></div>

<div class="form-box">

    <!-- Back button -->
    <a onclick="location.href='/dashboard.html'">← Back</a>

    <!-- Page heading -->
    <h2>Submit Research Proposal</h2>

    <!-- Title -->
    <input id="title" placeholder="Project Title">

    <!-- Domain -->
    <input id="domain" placeholder="Domain">

    <!-- Budget -->
    <input id="budget" type="number" placeholder="Budget">

    <!-- Description -->
    <textarea id="description" placeholder="Executive Summary"></textarea>

    <!-- File upload -->
    <input type="file" id="attachment">

    <!-- Submit button -->
    <button id="submitBtn" onclick="submitProposal()">Submit</button>

</div>


<script>


// ---------------- AUTH CHECK ----------------

// If user not logged in → redirect
if(!localStorage.getItem("role")) {
    window.location.href = "/";
}


// ---------------- NOTIFICATION ----------------
function showNotification(msg) {
    const container = document.getElementById("notification-container");

    const div = document.createElement("div");
    div.innerText = msg;

    container.appendChild(div);

    setTimeout(() => div.remove(), 3000);
}


// ---------------- FILE UPLOAD HANDLING ----------------

// Get file input
const fileInput = document.getElementById("attachment");


// ---------------- SUBMIT PROPOSAL ----------------
async function submitProposal() {

    // Get form values
    const title = document.getElementById("title").value;
    const description = document.getElementById("description").value;
    const domain = document.getElementById("domain").value;
    const budget = document.getElementById("budget").value;

    const btn = document.getElementById("submitBtn");

    // Validation
    if (!title || !description || !domain || !budget) {
        return showNotification("Fill all fields");
    }

    // Disable button during processing
    btn.innerText = "Submitting...";
    btn.disabled = true;

    // Create FormData (important for file upload)
    const formData = new FormData();

    formData.append("title", title);
    formData.append("description", description);
    formData.append("domain", domain);
    formData.append("budget", budget);

    // Add user email
    formData.append("submittedBy", localStorage.getItem("email"));

    // Add file if exists
    if (fileInput.files[0]) {
        formData.append("attachment", fileInput.files[0]);
    }

    try {
        // Send data to backend
        const res = await fetch("/proposals", {
            method: "POST",
            body: formData
        });

        const result = await res.json();

        if (result.success) {

            showNotification("Proposal submitted successfully");

            // Redirect to dashboard
            setTimeout(() => {
                window.location.href = "/dashboard.html";
            }, 1000);

        } else {
            showNotification("Error submitting proposal");
            resetBtn();
        }

    } catch (err) {
        showNotification("Server error");
        resetBtn();
    }
}


// ---------------- RESET BUTTON ----------------
function resetBtn() {
    const btn = document.getElementById("submitBtn");
    btn.innerText = "Submit";
    btn.disabled = false;
}

</script>

</body>
</html>
