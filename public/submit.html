<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Proposal | GrantSys</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>

    <style>
        :root {
            --primary: #6366f1; --primary-hover: #4f46e5; --primary-glow: rgba(99, 102, 241, 0.4);
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --glass-bg: rgba(255, 255, 255, 0.6); --glass-border: rgba(255, 255, 255, 0.8);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
            --text-main: #0f172a; --text-muted: #64748b;
            --card-bg: #ffffff; --input-bg: rgba(255,255,255,0.9);
        }
        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(30, 41, 59, 0.7); --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc; --text-muted: #94a3b8;
            --card-bg: #1e293b; --input-bg: rgba(15, 23, 42, 0.8);
        }

        body { margin: 0; background: var(--bg-gradient); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Inter', sans-serif; transition: 0.4s; }
        
        .form-box { background: var(--glass-bg); backdrop-filter: blur(20px); padding: 48px; border-radius: 24px; width: 100%; max-width: 600px; border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); }
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        .nav-link { color: var(--text-muted); text-decoration: none; font-weight: 600; cursor: pointer; }
        .theme-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-main); }
        
        /* FORM ELEMENTS */
        label { display: block; margin-bottom: 8px; font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase;}
        input, textarea { width: 100%; padding: 16px; margin-bottom: 24px; border-radius: 12px; border: 1px solid var(--glass-border); color: var(--text-main); background: var(--input-bg); box-sizing: border-box; outline: none; transition: 0.3s;}
        input:focus, textarea:focus { border-color: var(--primary); }
        .input-row { display: flex; gap: 16px; }
        .input-item { flex: 1; }

        /* UPLOAD ZONE UI */
        .drop-zone { border: 2px dashed var(--glass-border); border-radius: 16px; padding: 32px; text-align: center; cursor: pointer; background: var(--input-bg); margin-bottom: 8px; user-select: none;}
        .drop-zone:hover { border-color: var(--primary); background: rgba(99, 102, 241, 0.05); }
        .drop-zone.dragover { border-color: var(--primary); background: rgba(99, 102, 241, 0.1); }
        
        #undo-text { font-size: 13px; color: #ef4444; font-weight: 600; cursor: pointer; text-decoration: underline; margin-bottom: 32px; display: none;}
        
        .btn-submit { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <div class="form-box">
        <div class="top-nav">
            <a class="nav-link" onclick="location.href='/dashboard.html'"><span>←</span> Back to Dashboard</a>
            <button class="theme-btn" onclick="toggleTheme()" title="Toggle Theme">🌗</button>
        </div>
        
        <h2 style="margin-bottom: 32px; font-weight: 800;">Submit Research Proposal</h2>
        
        <!-- Standard Inputs -->
        <label>Project Title</label>
        <input id="title" placeholder="e.g., Quantum Computing Architecture">
        
        <div class="input-row">
            <div class="input-item"><label>Domain</label><input id="domain"></div>
            <div class="input-item"><label>Budget ($)</label><input id="budget" type="number"></div>
        </div>

        <label>Proposed Deadline (Required)</label>
        <input type="date" id="deadline">

        <label>Executive Summary</label>
        <textarea id="description"></textarea>

        <!-- Hidden input connected to visual upload zone (Now set to Double Click) -->
        <label>Upload Supporting Documents (PDF, PPT, PPTX)</label>
        <div class="drop-zone" id="drop-zone" ondblclick="document.getElementById('attachment').click()">
            <p id="drop-text">Double-click here to select your file</p>
            <input type="file" id="attachment" accept="application/pdf, .ppt, .pptx, application/vnd.ms-powerpoint, application/vnd.openxmlformats-officedocument.presentationml.presentation" hidden>
        </div>
        <p id="undo-text" onclick="undoFile()">✕ Undo upload</p>

        <button class="btn-submit" onclick="submitProposal()">Initialize Secure Submission</button>
    </div>
    
    <script>
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        /* FILE SELECTION LOGIC */
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('attachment');
        const undoText = document.getElementById('undo-text');

        // Update the text when a file is selected via the popup window
        fileInput.addEventListener('change', function() {
            if (this.files && this.files.length > 0) {
                document.getElementById('drop-text').innerText = `Selected: ${this.files[0].name}`;
                undoText.style.display = "block"; // Show the undo option
            }
        });

        function undoFile() {
            fileInput.value = ""; // Clear the file input
            document.getElementById('drop-text').innerText = "Double-click here to select your file";
            undoText.style.display = "none"; // Hide the undo option
        }

        // Prevent browser from opening files in a new tab when dragged over
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, e => e.preventDefault(), false);
        });

        // Add visual queue (highlight border) when user hovers a file
        ['dragenter', 'dragover'].forEach(eventName => dropZone.classList.add('dragover'));
        ['dragleave', 'drop'].forEach(eventName => dropZone.classList.remove('dragover'));

        // Handle the actual drop (Optional backup logic if they still drag and drop)
        dropZone.addEventListener('drop', e => {
            fileInput.files = e.dataTransfer.files;
            if(fileInput.files.length > 0) {
                document.getElementById('drop-text').innerText = `Selected: ${fileInput.files[0].name}`;
                undoText.style.display = "block";
            }
        });

        /* SUBMISSION HANDLER */
        async function submitProposal() {
            const title = document.getElementById("title").value;
            const description = document.getElementById("description").value;
            const domain = document.getElementById("domain").value;
            const budget = document.getElementById("budget").value;
            const deadline = document.getElementById("deadline").value;

            // Simple validation
            if (!title || !domain || !budget || !deadline) {
                return alert("Please fill in all required fields (Title, Domain, Budget, Deadline).");
            }

            // FormData is specifically required when sending files via fetch, unlike raw JSON
            const formData = new FormData();
            formData.append("title", title);
            formData.append("description", description);
            formData.append("domain", domain);
            formData.append("budget", budget);
            formData.append("deadline", deadline);
            formData.append("submittedBy", localStorage.getItem("email"));
            
            if (fileInput.files[0]) formData.append("attachment", fileInput.files[0]);
            
            try {
                const response = await fetch("/proposals", { method: "POST", body: formData });
                const result = await response.json();
                
                if (result.success) {
                    window.location.href = "/dashboard.html";
                } else {
                    alert("Upload Failed: " + result.error); 
                }
            } catch (error) {
                alert("A network error occurred. Is the server running?");
            }
        }
    </script>
</body>
</html>
